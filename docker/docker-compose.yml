services:
  postgres:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        PG_MAJOR: ${PG_MAJOR:-16}
    image: pg-koldstore:${PG_MAJOR:-16}
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: koldstore
    ports:
      - "${PG_PORT:-5432}:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U postgres -d koldstore && psql -U postgres -d koldstore -tAc \"SELECT 1 FROM pg_extension WHERE extname = 'koldstore'\" | grep -q 1",
        ]
      interval: 5s
      timeout: 5s
      retries: 30

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "${MINIO_PORT:-19000}:9000"
      - "${MINIO_CONSOLE_PORT:-19001}:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin; do
        sleep 1;
      done;
      mc mb --ignore-existing local/koldstore-test;
      mc anonymous set none local/koldstore-test;
      echo 'minio bucket koldstore-test is ready';
      "
    restart: "no"

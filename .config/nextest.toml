# Show proof-of-work output for the full lifecycle scenario test during suite runs.
[[profile.default.overrides]]
filter = 'test(full_lifecycle_wide_table_migrates_flushes_in_batches_and_queries_all_rows)'
success-output = "immediate"

[[profile.default.overrides]]
filter = 'package(stress)'
success-output = "immediate"
# Stress soaks are intentionally long; allow up to ~3h wall before terminate.
slow-timeout = { period = "300s", terminate-after = 36, grace-period = "30s" }


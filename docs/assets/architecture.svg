<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">KoldStore architecture</title>
  <desc id="desc">Application queries a normal PostgreSQL table. KoldMergeScan merges hot heap rows with cold Parquet segments from object storage.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="hot" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="cold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect width="1280" height="640" fill="url(#bg)"/>
  <text x="640" y="56" text-anchor="middle" fill="#f8fafc" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="34" font-weight="700">Keep one PostgreSQL table. Split hot and cold underneath.</text>
  <text x="640" y="96" text-anchor="middle" fill="#94a3b8" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="18">No replacement database. No application query rewrite.</text>

  <!-- App -->
  <rect x="460" y="130" width="360" height="70" rx="14" fill="#334155" stroke="#64748b" stroke-width="2"/>
  <text x="640" y="172" text-anchor="middle" fill="#f8fafc" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="22" font-weight="600">Application / ORM / SQL</text>

  <line x1="640" y1="200" x2="640" y2="240" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- Original table -->
  <rect x="400" y="245" width="480" height="80" rx="14" fill="#1d4ed8" stroke="#60a5fa" stroke-width="2"/>
  <text x="640" y="280" text-anchor="middle" fill="#eff6ff" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="22" font-weight="700">Original PostgreSQL Table</text>
  <text x="640" y="308" text-anchor="middle" fill="#bfdbfe" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="16">Same schema · same drivers · same transactions</text>

  <line x1="640" y1="325" x2="640" y2="365" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- Merge scan -->
  <rect x="430" y="370" width="420" height="70" rx="14" fill="#7c3aed" stroke="#c4b5fd" stroke-width="2"/>
  <text x="640" y="412" text-anchor="middle" fill="#f5f3ff" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="22" font-weight="700">KoldMergeScan</text>

  <!-- Split -->
  <line x1="640" y1="440" x2="360" y2="490" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="640" y1="440" x2="920" y2="490" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- Hot -->
  <rect x="180" y="500" width="360" height="90" rx="14" fill="url(#hot)"/>
  <text x="360" y="540" text-anchor="middle" fill="#fff7ed" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="22" font-weight="700">Hot PG Heap</text>
  <text x="360" y="570" text-anchor="middle" fill="#ffedd5" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="16">Recent working set stays in PostgreSQL</text>

  <!-- Cold -->
  <rect x="740" y="500" width="360" height="90" rx="14" fill="url(#cold)"/>
  <text x="920" y="540" text-anchor="middle" fill="#f0f9ff" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="22" font-weight="700">Manifest ’ Parquet / S3</text>
  <text x="920" y="570" text-anchor="middle" fill="#e0f2fe" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="16">Historical rows on storage you control</text>
</svg>

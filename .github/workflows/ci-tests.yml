name: CI Tests

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  PGRX_VERSION: "0.19.1"

jobs:
  rust:
    name: fmt / clippy / unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo install cargo-nextest --locked
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --no-default-features -- -D warnings
      - run: cargo nextest run --workspace --no-default-features --exclude e2e --exclude examples --exclude storage-comparison

  pgrx-test:
    name: cargo pgrx test (PG ${{ matrix.pg }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pg: [15, 16, 17, 18]
    env:
      PG_VER: ${{ matrix.pg }}
      PGRX_PG_CONFIG: /usr/lib/postgresql/${{ matrix.pg }}/bin/pg_config
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96.0
      - uses: Swatinem/rust-cache@v2

      - name: Install PostgreSQL ${{ matrix.pg }} development packages
        run: |
          bash scripts/ci/disable-broken-runner-apt-sources.sh
          sudo apt-get update -y -qq
          sudo apt-get install -y wget gnupg lsb-release
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo apt-key add -
          sudo apt-get update -y -qq
          sudo apt-get install -y \
            build-essential \
            libssl-dev \
            pkg-config \
            postgresql-${PG_VER} \
            postgresql-server-dev-${PG_VER}

      - name: Install cargo-pgrx
        run: cargo install cargo-pgrx --version ${PGRX_VERSION} --locked

      - name: Initialize pgrx for PostgreSQL ${{ matrix.pg }}
        run: cargo pgrx init --pg${PG_VER} "${PGRX_PG_CONFIG}"

      - name: Run #[pg_test] suite
        run: cargo pgrx test --manifest-path crates/pg_koldstore/Cargo.toml pg${PG_VER}
        env:
          RUST_BACKTRACE: "1"

  pgrx-integration:
    name: E2E + examples + SQL (PG ${{ matrix.pg }})
    runs-on: ubuntu-latest
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        pg: [15, 16, 17, 18]
    env:
      PG_VER: ${{ matrix.pg }}
      KOLDSTORE_E2E_PGVERSION: ${{ matrix.pg }}
      KOLDSTORE_E2E_PGPORT: ${{ format('288{0}', matrix.pg) }}
      KOLDSTORE_E2E_PGHOST: 127.0.0.1
      KOLDSTORE_E2E_PGDATABASE: koldstore_pgrx_e2e
      KOLDSTORE_E2E_WAIT_FOR_STARTUP: "1"
      KOLDSTORE_EXAMPLE_PGVERSION: ${{ matrix.pg }}
      PGRX_PG_CONFIG: /usr/lib/postgresql/${{ matrix.pg }}/bin/pg_config
      # Keep example scenarios CI-friendly while still exercising flush + concurrency.
      KOLDSTORE_EXAMPLE_ROWS: "2000"
      KOLDSTORE_EXAMPLE_CLIENTS: "4"
      KOLDSTORE_EXAMPLE_SCOPES: "8"
      KOLDSTORE_EXAMPLE_TIMEOUT_SECS: "600"
      KOLDSTORE_STORAGE_ROWS: "10000"
      KOLDSTORE_STORAGE_HOT_LIMIT: "2000"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96.0
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: nextest

      - name: Install PostgreSQL ${{ matrix.pg }} development packages
        run: |
          bash scripts/ci/disable-broken-runner-apt-sources.sh
          sudo apt-get update -y -qq
          sudo apt-get install -y wget gnupg lsb-release
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo apt-key add -
          sudo apt-get update -y -qq
          sudo apt-get install -y \
            build-essential \
            libssl-dev \
            pkg-config \
            postgresql-${PG_VER} \
            postgresql-server-dev-${PG_VER}

      - name: Install cargo-pgrx
        run: cargo install cargo-pgrx --version ${PGRX_VERSION} --locked

      - name: Initialize pgrx for PostgreSQL ${{ matrix.pg }}
        run: cargo pgrx init --pg${PG_VER} "${PGRX_PG_CONFIG}"

      - name: Compile pg_koldstore for PostgreSQL ${{ matrix.pg }}
        run: cargo clippy -p pg_koldstore --all-targets --no-default-features --features pg${PG_VER} -- -D warnings

      - name: Start MinIO for S3-backed E2E
        run: bash scripts/ci/start-minio.sh

      - name: Start pgrx PostgreSQL ${{ matrix.pg }} and install koldstore
        run: bash scripts/run-pg-e2e.sh "${PG_VER}"
        env:
          KOLDSTORE_E2E_PREPARE_ONLY: "1"
          KOLDSTORE_PGRX_INSTALL_SUDO: "1"

      - name: Run E2E suite (includes isolation + crash/failpoint harnesses)
        run: cargo nextest run -p e2e --test-threads 1
        env:
          KOLDSTORE_MINIO: "1"
          KOLDSTORE_MINIO_ENDPOINT: http://127.0.0.1:9000
          KOLDSTORE_MINIO_ACCESS_KEY: minioadmin
          KOLDSTORE_MINIO_SECRET_KEY: minioadmin
          KOLDSTORE_MINIO_BUCKET: koldstore-test

      - name: Run example scenarios
        run: bash scripts/run-examples.sh
        env:
          KOLDSTORE_PGRX_INSTALL_SUDO: "1"

      - name: Run storage comparison (baseline vs managed)
        run: bash scripts/run-storage-comparison.sh --pg-version "${PG_VER}"
        env:
          KOLDSTORE_PGRX_INSTALL_SUDO: "1"

      - name: Run KoldStore SQL regression
        run: bash scripts/run-sql-regression.sh "${PG_VER}"
        env:
          KOLDSTORE_PGRX_INSTALL_SUDO: "1"

  memory:
    name: memory checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96.0
      - run: cargo install cargo-nextest --locked
      - run: tests/memory/run_memory_checks.sh

name: Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to create/use (example: v0.1.0)"
        required: true
        default: "v0.1.0"
      run_pgrx_tests:
        description: "Run pgrx compile/install and local E2E checks before packaging"
        type: boolean
        required: false
        default: true
      github_release:
        description: "Publish GitHub Release"
        type: boolean
        required: false
        default: false
      pre_release:
        description: "Mark GitHub Release as pre-release"
        type: boolean
        required: false
        default: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: "1.96.0"
  PGRX_VERSION: "0.19.1"

jobs:
  read_version:
    name: Read Release Inputs
    runs-on: ubuntu-24.04
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Read and validate release tag
        id: version
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ inputs.release_tag }}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::release_tag must look like v0.1.0 or v0.1.0-rc.1"
            exit 1
          fi
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Verify workspace version matches release tag
        shell: bash
        run: |
          set -euo pipefail
          WORKSPACE_VERSION="$(python3 - <<'PY'
          from pathlib import Path
          import re

          text = Path("Cargo.toml").read_text()
          match = re.search(r"(?m)^\[workspace\.package\]\s*(?:\n[^\[]*)?^version\s*=\s*\"([^\"]+)\"", text)
          if not match:
              raise SystemExit("workspace.package.version not found")
          print(match.group(1))
          PY
          )"
          if [[ "$WORKSPACE_VERSION" != "${{ steps.version.outputs.version }}" ]]; then
            echo "::error::release_tag ${{ steps.version.outputs.tag }} does not match workspace version ${WORKSPACE_VERSION}"
            exit 1
          fi

  rust_checks:
    name: Rust Checks
    runs-on: ubuntu-24.04
    needs: read_version
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - run: cargo install cargo-nextest --locked
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --no-default-features -- -D warnings
      - run: cargo nextest run --workspace --no-default-features --exclude e2e

  pgrx_tests:
    name: "pgrx + E2E · PG${{ matrix.pg }}"
    runs-on: ubuntu-24.04
    needs: rust_checks
    if: ${{ inputs.run_pgrx_tests }}
    strategy:
      fail-fast: false
      matrix:
        pg: [15, 16, 17, 18]
    env:
      PG_VER: ${{ matrix.pg }}
      KOLDSTORE_E2E_PGVERSION: ${{ matrix.pg }}
      KOLDSTORE_E2E_PGPORT: ${{ format('288{0}', matrix.pg) }}
      KOLDSTORE_E2E_PGHOST: 127.0.0.1
      KOLDSTORE_E2E_PGDATABASE: koldstore_pgrx_e2e
      KOLDSTORE_E2E_WAIT_FOR_STARTUP: "1"
      PGRX_PG_CONFIG: /usr/lib/postgresql/${{ matrix.pg }}/bin/pg_config
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-pgrx-pg${{ matrix.pg }}
          cache-on-failure: true

      - uses: taiki-e/install-action@v2
        with:
          tool: nextest

      - name: Install PostgreSQL ${{ matrix.pg }} development packages
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ca-certificates curl gnupg lsb-release
          sudo install -d /usr/share/postgresql-common/pgdg
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            | sudo gpg --batch --yes --dearmor -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.gpg
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.gpg] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential clang libclang-dev libreadline-dev libssl-dev pkg-config \
            postgresql-${PG_VER} postgresql-server-dev-${PG_VER}

      - name: Install cargo-pgrx
        run: |
          if ! command -v cargo-pgrx >/dev/null 2>&1 || ! cargo pgrx --version | grep -q "cargo-pgrx ${PGRX_VERSION}$"; then
            cargo install cargo-pgrx --version "${PGRX_VERSION}" --locked
          fi

      - name: Initialize pgrx for PostgreSQL ${{ matrix.pg }}
        run: cargo pgrx init --pg${PG_VER} "${PGRX_PG_CONFIG}"

      - name: Run E2E tests on PostgreSQL ${{ matrix.pg }}
        run: bash scripts/run-pg-e2e.sh "${PG_VER}"
        env:
          KOLDSTORE_PGRX_INSTALL_SUDO: "1"

  build_linux_ubuntu:
    name: "Package · PG${{ matrix.pg }} · ${{ matrix.distro }} · ${{ matrix.arch }}"
    runs-on: ${{ matrix.runner }}
    needs: [read_version, rust_checks, pgrx_tests]
    if: >-
      ${{
        always() &&
        !cancelled() &&
        !failure() &&
        (needs.pgrx_tests.result == 'success' || needs.pgrx_tests.result == 'skipped')
      }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { pg: 15, arch: amd64, distro: ubuntu22.04, runner: ubuntu-22.04 }
          - { pg: 15, arch: arm64, distro: ubuntu22.04, runner: ubuntu-22.04-arm }
          - { pg: 16, arch: amd64, distro: ubuntu24.04, runner: ubuntu-24.04 }
          - { pg: 16, arch: arm64, distro: ubuntu24.04, runner: ubuntu-24.04-arm }
    steps:
      - uses: actions/checkout@v4

      - name: Install curl for rustup
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ca-certificates curl

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.distro }}-pg${{ matrix.pg }}-${{ matrix.arch }}
          cache-on-failure: true

      - name: Build Linux packages
        run: |
          bash scripts/build-linux.sh \
            --pg "${{ matrix.pg }}" \
            --arch "${{ matrix.arch }}" \
            --distro "${{ matrix.distro }}" \
            --version "${{ needs.read_version.outputs.version }}" \
            --install-deps

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pkg-pg${{ matrix.pg }}-${{ matrix.distro }}-${{ matrix.arch }}
          path: |
            dist/${{ needs.read_version.outputs.version }}/*.deb
            dist/${{ needs.read_version.outputs.version }}/*.tar.gz
          if-no-files-found: error
          retention-days: 90

  build_linux_debian:
    name: "Package · PG${{ matrix.pg }} · ${{ matrix.distro }} · ${{ matrix.arch }}"
    runs-on: ${{ matrix.runner }}
    container:
      image: debian:bookworm
    needs: [read_version, rust_checks, pgrx_tests]
    if: >-
      ${{
        always() &&
        !cancelled() &&
        !failure() &&
        (needs.pgrx_tests.result == 'success' || needs.pgrx_tests.result == 'skipped')
      }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { pg: 17, arch: amd64, distro: debian12, runner: ubuntu-24.04 }
          - { pg: 17, arch: arm64, distro: debian12, runner: ubuntu-24.04-arm }
    steps:
      - uses: actions/checkout@v4

      - name: Install curl for rustup
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ca-certificates curl

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.distro }}-pg${{ matrix.pg }}-${{ matrix.arch }}
          cache-on-failure: true

      - name: Build Linux packages
        run: |
          bash scripts/build-linux.sh \
            --pg "${{ matrix.pg }}" \
            --arch "${{ matrix.arch }}" \
            --distro "${{ matrix.distro }}" \
            --version "${{ needs.read_version.outputs.version }}" \
            --install-deps

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pkg-pg${{ matrix.pg }}-${{ matrix.distro }}-${{ matrix.arch }}
          path: |
            dist/${{ needs.read_version.outputs.version }}/*.deb
            dist/${{ needs.read_version.outputs.version }}/*.tar.gz
          if-no-files-found: error
          retention-days: 90

  build_linux_rocky:
    name: "Package · PG${{ matrix.pg }} · ${{ matrix.distro }} · ${{ matrix.arch }}"
    runs-on: ${{ matrix.runner }}
    container:
      image: rockylinux:9
    needs: [read_version, rust_checks, pgrx_tests]
    if: >-
      ${{
        always() &&
        !cancelled() &&
        !failure() &&
        (needs.pgrx_tests.result == 'success' || needs.pgrx_tests.result == 'skipped')
      }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { pg: 18, arch: amd64, distro: rocky9, runner: ubuntu-24.04 }
          - { pg: 18, arch: arm64, distro: rocky9, runner: ubuntu-24.04-arm }
    steps:
      - uses: actions/checkout@v4

      - name: Install curl for rustup
        run: dnf -y install --allowerasing ca-certificates curl

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.distro }}-pg${{ matrix.pg }}-${{ matrix.arch }}
          cache-on-failure: true

      - name: Build Linux packages
        run: |
          bash scripts/build-linux.sh \
            --pg "${{ matrix.pg }}" \
            --arch "${{ matrix.arch }}" \
            --distro "${{ matrix.distro }}" \
            --version "${{ needs.read_version.outputs.version }}" \
            --install-deps

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pkg-pg${{ matrix.pg }}-${{ matrix.distro }}-${{ matrix.arch }}
          path: |
            dist/${{ needs.read_version.outputs.version }}/*.rpm
            dist/${{ needs.read_version.outputs.version }}/*.tar.gz
          if-no-files-found: error
          retention-days: 90

  build_macos:
    name: Package · PG18 · macos · arm64
    runs-on: macos-14
    needs: [read_version, rust_checks, pgrx_tests]
    if: >-
      ${{
        always() &&
        !cancelled() &&
        !failure() &&
        (needs.pgrx_tests.result == 'success' || needs.pgrx_tests.result == 'skipped')
      }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-macos-arm64-pg18
          cache-on-failure: true

      - name: Build macOS package
        run: |
          bash scripts/build-macos-arm64.sh \
            --pg 18 \
            --version "${{ needs.read_version.outputs.version }}" \
            --install-deps

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: pkg-pg18-macos-arm64
          path: dist/${{ needs.read_version.outputs.version }}/*.tar.gz
          if-no-files-found: error
          retention-days: 90

  build_windows:
    name: Package · PG18 · windows · amd64
    runs-on: windows-latest
    needs: [read_version, rust_checks, pgrx_tests]
    if: >-
      ${{
        always() &&
        !cancelled() &&
        !failure() &&
        (needs.pgrx_tests.result == 'success' || needs.pgrx_tests.result == 'skipped')
      }}
    steps:
      - uses: actions/checkout@v4

      - name: Enable Windows long paths
        shell: bash
        run: git config --global core.longpaths true

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-windows-amd64-pg18
          cache-on-failure: true

      - name: Install LLVM
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "16.0.6"

      - name: Configure bindgen environment
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $libClangPath = Join-Path $env:LLVM_PATH "bin"
          if (-not (Test-Path (Join-Path $libClangPath "libclang.dll"))) {
            throw "libclang.dll not found under $libClangPath"
          }
          "LIBCLANG_PATH=$libClangPath" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Build Windows package
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          ./scripts/build-windows.ps1 -Pg 18 -Version "${{ needs.read_version.outputs.version }}"

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: pkg-pg18-windows-amd64
          path: dist/${{ needs.read_version.outputs.version }}/*.zip
          if-no-files-found: error
          retention-days: 90

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-24.04
    needs:
      - read_version
      - build_linux_ubuntu
      - build_linux_debian
      - build_linux_rocky
      - build_macos
      - build_windows
    if: >-
      ${{
        inputs.github_release &&
        always() &&
        !cancelled() &&
        !failure()
      }}
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: pkg-*
          merge-multiple: true

      - name: Generate SHA256SUMS
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.read_version.outputs.version }}"
          mkdir -p "dist/${VERSION}"
          find release-assets -type f \( -name '*.deb' -o -name '*.rpm' -o -name '*.tar.gz' -o -name '*.zip' \) -exec cp {} "dist/${VERSION}/" \;
          cd "dist/${VERSION}"
          shopt -s nullglob
          assets=( *.deb *.rpm *.tar.gz *.zip )
          if [[ ${#assets[@]} -eq 0 ]]; then
            echo "::error::No release artifacts found."
            exit 1
          fi
          printf '%s\n' "${assets[@]}" | sort
          sha256sum "${assets[@]}" > SHA256SUMS
          ls -lh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.read_version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          prerelease: ${{ inputs.pre_release }}
          generate_release_notes: true
          files: |
            dist/${{ needs.read_version.outputs.version }}/*.deb
            dist/${{ needs.read_version.outputs.version }}/*.rpm
            dist/${{ needs.read_version.outputs.version }}/*.tar.gz
            dist/${{ needs.read_version.outputs.version }}/*.zip
            dist/${{ needs.read_version.outputs.version }}/SHA256SUMS
          fail_on_unmatched_files: true

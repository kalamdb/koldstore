name: Release

on:
  workflow_dispatch:
    inputs:
      run_pgrx_tests:
        description: "Run cargo pgrx test + E2E on PostgreSQL 15–18 before packaging"
        type: boolean
        required: false
        default: true
      github_release:
        description: "Publish GitHub Release"
        type: boolean
        required: false
        default: false
      pre_release:
        description: "Mark GitHub Release as pre-release when creating a new tag (ignored if that tag is already a full/latest release)"
        type: boolean
        required: false
        default: true
      docker_push:
        description: "Build, smoke-test, and push PostgreSQL 16 + koldstore Docker image to Docker Hub and GHCR (GitHub Packages)"
        type: boolean
        required: false
        default: false
      docker_repo:
        description: "Docker Hub repo (owner/name) for the try-it PostgreSQL image"
        type: string
        required: false
        default: "jamals86/pg-koldstore"
      ghcr_image:
        description: "GHCR image (ghcr.io/owner/name) for the try-it PostgreSQL image"
        type: string
        required: false
        default: "ghcr.io/kalamdb/pg-koldstore"

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: "1.96.0"
  PGRX_VERSION: "0.19.1"
  CARGO_PROFILE: release-pg-dist
  DOCKER_PG_MAJOR: "16"
  DOCKER_PG_DISTRO: "ubuntu24.04"

jobs:
  read_version:
    name: Read Version Metadata
    runs-on: ubuntu-24.04
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Read version from Cargo.toml
        id: version
        shell: bash
        run: python3 scripts/build/release-version.py github-outputs --github-output "$GITHUB_OUTPUT"

      - name: Show release version
        run: echo "Release tag ${{ steps.version.outputs.tag }} (version ${{ steps.version.outputs.version }})"

  rust_checks:
    name: Rust Checks
    runs-on: ubuntu-24.04
    needs: read_version
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - run: cargo install cargo-nextest --locked
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --no-default-features -- -D warnings
      - run: cargo nextest run --workspace --no-default-features --exclude e2e --exclude examples --exclude storage-comparison --exclude pg-koldstore-benchmarks --exclude koldstore-memory-tests --exclude stress

  pgrx_tests:
    name: "pgrx test + E2E · PG${{ matrix.pg }}"
    runs-on: ubuntu-24.04
    needs: rust_checks
    if: ${{ inputs.run_pgrx_tests }}
    strategy:
      fail-fast: false
      matrix:
        pg: [15, 16, 17, 18]
    env:
      PG_VER: ${{ matrix.pg }}
      KOLDSTORE_E2E_PGVERSION: ${{ matrix.pg }}
      KOLDSTORE_E2E_PGPORT: ${{ format('288{0}', matrix.pg) }}
      KOLDSTORE_E2E_PGHOST: 127.0.0.1
      KOLDSTORE_E2E_PGDATABASE: koldstore_pgrx_e2e
      KOLDSTORE_E2E_WAIT_FOR_STARTUP: "1"
      PGRX_PG_CONFIG: /usr/lib/postgresql/${{ matrix.pg }}/bin/pg_config
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-pgrx-pg${{ matrix.pg }}
          cache-on-failure: true

      - uses: taiki-e/install-action@v2
        with:
          tool: nextest

      - name: Install PostgreSQL ${{ matrix.pg }} development packages
        run: |
          bash scripts/ci/disable-broken-runner-apt-sources.sh
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ca-certificates curl gnupg lsb-release
          sudo install -d /usr/share/postgresql-common/pgdg
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            | sudo gpg --batch --yes --dearmor -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.gpg
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.gpg] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential clang libclang-dev libreadline-dev libssl-dev pkg-config \
            postgresql-${PG_VER} postgresql-server-dev-${PG_VER}

      - name: Install cargo-pgrx
        run: |
          # shellcheck source=scripts/build/release-common.sh
          source scripts/build/release-common.sh
          ensure_cargo_pgrx

      - name: Initialize pgrx for PostgreSQL ${{ matrix.pg }}
        run: cargo pgrx init --pg${PG_VER} "${PGRX_PG_CONFIG}"

      # `cargo pgrx test` installs into pg_config --sharedir/--pkglibdir. Apt packages
      # put those under /usr, so the runner needs write access without --sudo (pgrx
      # test has no install --sudo flag).
      - name: Allow non-root extension install into system PostgreSQL
        run: |
          share_ext="$("${PGRX_PG_CONFIG}" --sharedir)/extension"
          pkglib="$("${PGRX_PG_CONFIG}" --pkglibdir)"
          sudo mkdir -p "${share_ext}" "${pkglib}"
          sudo chmod a+w "${share_ext}" "${pkglib}"

      # Serial threads are required: #[pg_test] shares one DB and one async logical
      # slot; parallel flush fences race on PostgreSQL's nowait slot acquire.
      - name: "Run pg_test suite (nextest, serial)"
        run: |
          features="pg${PG_VER} pg_test s3"
          manifest="${GITHUB_WORKSPACE}/crates/pg_koldstore/Cargo.toml"
          CARGO_TARGET_DIR="${GITHUB_WORKSPACE}/target" \
            PGRX_FEATURES="${features}" \
            PGRX_NO_DEFAULT_FEATURES=true \
            PGRX_ALL_FEATURES=false \
            PGRX_BUILD_PROFILE=dev \
            PGRX_NO_SCHEMA=false \
            PGRX_MANIFEST_PATH="${manifest}" \
            cargo nextest run \
              --manifest-path "${manifest}" \
              --features "${features}" \
              --no-default-features \
              --test-threads 1
        env:
          RUST_BACKTRACE: "1"

      - name: Start MinIO for S3-backed E2E
        run: bash scripts/ci/start-minio.sh

      - name: Run E2E tests on PostgreSQL ${{ matrix.pg }}
        run: bash scripts/run-pg-e2e.sh "${PG_VER}"
        env:
          KOLDSTORE_PGRX_INSTALL_SUDO: "1"
          KOLDSTORE_MINIO: "1"
          KOLDSTORE_MINIO_ENDPOINT: http://127.0.0.1:9000
          KOLDSTORE_MINIO_ACCESS_KEY: minioadmin
          KOLDSTORE_MINIO_SECRET_KEY: minioadmin
          KOLDSTORE_MINIO_BUCKET: koldstore-test

  build_linux_ubuntu:
    name: "Package · PG${{ matrix.pg }} · ${{ matrix.distro }} · ${{ matrix.arch }}"
    runs-on: ${{ matrix.runner }}
    needs: [read_version, rust_checks, pgrx_tests]
    if: >-
      ${{
        always() &&
        !cancelled() &&
        !failure() &&
        (needs.pgrx_tests.result == 'success' || needs.pgrx_tests.result == 'skipped')
      }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { pg: 15, arch: amd64, distro: ubuntu22.04, runner: ubuntu-22.04 }
          - { pg: 15, arch: arm64, distro: ubuntu22.04, runner: ubuntu-22.04-arm }
          - { pg: 16, arch: amd64, distro: ubuntu24.04, runner: ubuntu-24.04 }
          - { pg: 16, arch: arm64, distro: ubuntu24.04, runner: ubuntu-24.04-arm }
    steps:
      - uses: actions/checkout@v4

      - name: Install curl for rustup
        run: |
          bash scripts/ci/disable-broken-runner-apt-sources.sh
          sudo apt-get update && sudo apt-get install -y --no-install-recommends ca-certificates curl

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.distro }}-pg${{ matrix.pg }}-${{ matrix.arch }}
          cache-on-failure: true

      - name: Build Linux packages
        run: |
          bash scripts/build/linux.sh \
            --pg "${{ matrix.pg }}" \
            --arch "${{ matrix.arch }}" \
            --distro "${{ matrix.distro }}" \
            --version "${{ needs.read_version.outputs.version }}" \
            --install-deps

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pkg-pg${{ matrix.pg }}-${{ matrix.distro }}-${{ matrix.arch }}
          path: |
            dist/${{ needs.read_version.outputs.version }}/*.deb
            dist/${{ needs.read_version.outputs.version }}/*.tar.gz
          if-no-files-found: error
          retention-days: 90

  build_linux_debian:
    name: "Package · PG${{ matrix.pg }} · ${{ matrix.distro }} · ${{ matrix.arch }}"
    runs-on: ${{ matrix.runner }}
    container:
      image: debian:bookworm
    needs: [read_version, rust_checks, pgrx_tests]
    if: >-
      ${{
        always() &&
        !cancelled() &&
        !failure() &&
        (needs.pgrx_tests.result == 'success' || needs.pgrx_tests.result == 'skipped')
      }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { pg: 17, arch: amd64, distro: debian12, runner: ubuntu-24.04 }
          - { pg: 17, arch: arm64, distro: debian12, runner: ubuntu-24.04-arm }
    steps:
      - uses: actions/checkout@v4

      - name: Install curl for rustup
        run: apt-get update && apt-get install -y --no-install-recommends ca-certificates curl

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.distro }}-pg${{ matrix.pg }}-${{ matrix.arch }}
          cache-on-failure: true

      - name: Build Linux packages
        run: |
          bash scripts/build/linux.sh \
            --pg "${{ matrix.pg }}" \
            --arch "${{ matrix.arch }}" \
            --distro "${{ matrix.distro }}" \
            --version "${{ needs.read_version.outputs.version }}" \
            --install-deps

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pkg-pg${{ matrix.pg }}-${{ matrix.distro }}-${{ matrix.arch }}
          path: |
            dist/${{ needs.read_version.outputs.version }}/*.deb
            dist/${{ needs.read_version.outputs.version }}/*.tar.gz
          if-no-files-found: error
          retention-days: 90

  build_linux_rocky:
    name: "Package · PG${{ matrix.pg }} · ${{ matrix.distro }} · ${{ matrix.arch }}"
    runs-on: ${{ matrix.runner }}
    container:
      image: rockylinux:9
    needs: [read_version, rust_checks, pgrx_tests]
    if: >-
      ${{
        always() &&
        !cancelled() &&
        !failure() &&
        (needs.pgrx_tests.result == 'success' || needs.pgrx_tests.result == 'skipped')
      }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { pg: 18, arch: amd64, distro: rocky9, runner: ubuntu-24.04 }
          - { pg: 18, arch: arm64, distro: rocky9, runner: ubuntu-24.04-arm }
    steps:
      - uses: actions/checkout@v4

      - name: Install curl for rustup
        run: dnf -y install --allowerasing ca-certificates curl

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.distro }}-pg${{ matrix.pg }}-${{ matrix.arch }}
          cache-on-failure: true

      - name: Build Linux packages
        run: |
          bash scripts/build/linux.sh \
            --pg "${{ matrix.pg }}" \
            --arch "${{ matrix.arch }}" \
            --distro "${{ matrix.distro }}" \
            --version "${{ needs.read_version.outputs.version }}" \
            --install-deps

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pkg-pg${{ matrix.pg }}-${{ matrix.distro }}-${{ matrix.arch }}
          path: |
            dist/${{ needs.read_version.outputs.version }}/*.rpm
            dist/${{ needs.read_version.outputs.version }}/*.tar.gz
          if-no-files-found: error
          retention-days: 90

  build_macos:
    name: Package · PG18 · macos · arm64
    runs-on: macos-14
    needs: [read_version, rust_checks, pgrx_tests]
    if: >-
      ${{
        always() &&
        !cancelled() &&
        !failure() &&
        (needs.pgrx_tests.result == 'success' || needs.pgrx_tests.result == 'skipped')
      }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-macos-arm64-pg18
          cache-on-failure: true

      - name: Build macOS package
        run: |
          bash scripts/build/macos-arm64.sh \
            --pg 18 \
            --version "${{ needs.read_version.outputs.version }}" \
            --install-deps

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: pkg-pg18-macos-arm64
          path: dist/${{ needs.read_version.outputs.version }}/*.tar.gz
          if-no-files-found: error
          retention-days: 90

  build_windows:
    name: Package · PG18 · windows · amd64
    runs-on: windows-latest
    needs: [read_version, rust_checks, pgrx_tests]
    if: >-
      ${{
        always() &&
        !cancelled() &&
        !failure() &&
        (needs.pgrx_tests.result == 'success' || needs.pgrx_tests.result == 'skipped')
      }}
    steps:
      - uses: actions/checkout@v4

      - name: Enable Windows long paths
        shell: bash
        run: git config --global core.longpaths true

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-windows-amd64-pg18
          cache-on-failure: true

      - name: Install LLVM
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "16.0.6"

      - name: Configure bindgen environment
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $libClangPath = Join-Path $env:LLVM_PATH "bin"
          if (-not (Test-Path (Join-Path $libClangPath "libclang.dll"))) {
            throw "libclang.dll not found under $libClangPath"
          }
          "LIBCLANG_PATH=$libClangPath" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Build Windows package
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          ./scripts/build/windows.ps1 -Pg 18 -Version "${{ needs.read_version.outputs.version }}"

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: pkg-pg18-windows-amd64
          path: dist/${{ needs.read_version.outputs.version }}/*.zip
          if-no-files-found: error
          retention-days: 90

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-24.04
    needs:
      - read_version
      - build_linux_ubuntu
      - build_linux_debian
      - build_linux_rocky
      - build_macos
      - build_windows
    if: >-
      ${{
        inputs.github_release &&
        always() &&
        !cancelled() &&
        !failure()
      }}
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: pkg-*
          merge-multiple: true

      - name: Generate SHA256SUMS
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.read_version.outputs.version }}"
          mkdir -p "dist/${VERSION}"
          find release-assets -type f \( -name '*.deb' -o -name '*.rpm' -o -name '*.tar.gz' -o -name '*.zip' \) -exec cp {} "dist/${VERSION}/" \;
          cd "dist/${VERSION}"
          shopt -s nullglob
          assets=( *.deb *.rpm *.tar.gz *.zip )
          if [[ ${#assets[@]} -eq 0 ]]; then
            echo "::error::No release artifacts found."
            exit 1
          fi
          printf '%s\n' "${assets[@]}" | sort
          sha256sum "${assets[@]}" > SHA256SUMS
          ls -lh

      - name: Resolve prerelease flag
        id: prerelease
        shell: bash
        env:
          REQUESTED_PRERELEASE: ${{ inputs.pre_release }}
          TAG: ${{ needs.read_version.outputs.tag }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          requested="${REQUESTED_PRERELEASE}"
          effective="${requested}"
          reason="new release; using workflow input pre_release=${requested}"

          if release_json="$(gh release view "${TAG}" --json isPrerelease,isLatest 2>/dev/null)"; then
            is_prerelease="$(printf '%s' "${release_json}" | jq -r '.isPrerelease')"
            is_latest="$(printf '%s' "${release_json}" | jq -r '.isLatest')"
            if [[ "${is_prerelease}" == "false" ]]; then
              # Never demote a published full/latest release to pre-release.
              effective="false"
              reason="tag ${TAG} already published as a full release (isLatest=${is_latest}); preserving non-prerelease"
            else
              reason="tag ${TAG} already exists as a pre-release; using workflow input pre_release=${requested}"
            fi
          fi

          {
            echo "effective=${effective}"
            echo "reason=${reason}"
          } >> "$GITHUB_OUTPUT"
          echo "::notice::GitHub Release prerelease=${effective} (${reason})"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.read_version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          prerelease: ${{ steps.prerelease.outputs.effective }}
          generate_release_notes: true
          files: |
            dist/${{ needs.read_version.outputs.version }}/*.deb
            dist/${{ needs.read_version.outputs.version }}/*.rpm
            dist/${{ needs.read_version.outputs.version }}/*.tar.gz
            dist/${{ needs.read_version.outputs.version }}/*.zip
            dist/${{ needs.read_version.outputs.version }}/SHA256SUMS
          fail_on_unmatched_files: true

  # Publish PostgreSQL 16 + prebuilt koldstore + pg_cron to Docker Hub and GHCR.
  # Per-arch images use the matching ubuntu24.04 package artifact (native .so);
  # docker_pg_manifest then publishes a multi-arch :version / :latest index.
  docker_pg:
    name: "Build PG Docker · ${{ matrix.arch }}"
    runs-on: ${{ matrix.runner }}
    needs:
      - read_version
      - build_linux_ubuntu
    if: >-
      ${{
        inputs.docker_push &&
        always() &&
        !cancelled() &&
        !failure() &&
        needs.build_linux_ubuntu.result == 'success'
      }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { arch: amd64, platform: linux/amd64, runner: ubuntu-24.04 }
          - { arch: arm64, platform: linux/arm64, runner: ubuntu-24.04-arm }
    env:
      DOCKER_REPO_INPUT: ${{ inputs.docker_repo }}
      GHCR_IMAGE_INPUT: ${{ inputs.ghcr_image }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate Docker Hub secrets
        shell: bash
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${DOCKERHUB_USERNAME}" ]]; then
            echo "::error::DOCKERHUB_USERNAME repository secret is not configured." >&2
            exit 1
          fi
          if [[ -z "${DOCKERHUB_TOKEN}" ]]; then
            echo "::error::DOCKERHUB_TOKEN repository secret is not configured." >&2
            exit 1
          fi

      - name: Set Docker image variables
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.read_version.outputs.version }}"
          SHORT_SHA="${GITHUB_SHA:0:7}"
          ARCH="${{ matrix.arch }}"
          DOCKER_REPO="${DOCKER_REPO_INPUT:-jamals86/pg-koldstore}"
          GHCR_IMAGE="${GHCR_IMAGE_INPUT:-ghcr.io/kalamdb/pg-koldstore}"
          if [[ ! "${DOCKER_REPO}" =~ ^[A-Za-z0-9]+([._-][A-Za-z0-9]+)*\/[A-Za-z0-9]+([._-][A-Za-z0-9]+)*$ ]]; then
            echo "::error::Invalid docker_repo '${DOCKER_REPO}'. Expected owner/name." >&2
            exit 1
          fi
          if [[ ! "${GHCR_IMAGE}" =~ ^ghcr\.io\/[A-Za-z0-9]+([._-][A-Za-z0-9]+)*\/[A-Za-z0-9]+([._-][A-Za-z0-9]+)*$ ]]; then
            echo "::error::Invalid ghcr_image '${GHCR_IMAGE}'. Expected ghcr.io/owner/name." >&2
            exit 1
          fi
          CANDIDATE_TAG="${VERSION}-pg${DOCKER_PG_MAJOR}-ci-${SHORT_SHA}"
          # OCI image label + Docker Hub short description (≤100 chars).
          # Full Hub Overview is synced from docker/image-description.txt after promote.
          DESCRIPTION="PostgreSQL 16 with koldstore preinstalled for trying KoldStore quickly."
          {
            echo "docker_repo=${DOCKER_REPO}"
            echo "ghcr_image=${GHCR_IMAGE}"
            echo "candidate_tag=${CANDIDATE_TAG}"
            echo "candidate_arch_tag=${CANDIDATE_TAG}-${ARCH}"
            echo "version_tag=${VERSION}-pg${DOCKER_PG_MAJOR}"
            echo "latest_tag=latest"
            echo "description=${DESCRIPTION}"
          } >> "$GITHUB_OUTPUT"
          echo "Docker Hub repo: ${DOCKER_REPO}"
          echo "GHCR image: ${GHCR_IMAGE}"
          echo "Candidate arch tag: ${CANDIDATE_TAG}-${ARCH} (${{ matrix.platform }})"

      - name: Download PG${{ env.DOCKER_PG_MAJOR }} ${{ matrix.arch }} package artifact
        uses: actions/download-artifact@v4
        with:
          name: pkg-pg${{ env.DOCKER_PG_MAJOR }}-${{ env.DOCKER_PG_DISTRO }}-${{ matrix.arch }}
          path: pkg-download/

      - name: Prepare docker-artifacts from release tarball
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.read_version.outputs.version }}"
          ARCH="${{ matrix.arch }}"
          TARBALL="$(find pkg-download -type f -name "pg_koldstore-v${VERSION}-pg${DOCKER_PG_MAJOR}-${DOCKER_PG_DISTRO}-${ARCH}.tar.gz" | head -n 1)"
          if [[ -z "${TARBALL}" ]]; then
            echo "::error::Expected tarball pg_koldstore-v${VERSION}-pg${DOCKER_PG_MAJOR}-${DOCKER_PG_DISTRO}-${ARCH}.tar.gz not found." >&2
            find pkg-download -type f | sort >&2 || true
            exit 1
          fi

          mkdir -p tarball-extract docker-artifacts
          tar -xzf "${TARBALL}" -C tarball-extract

          SO="$(find tarball-extract -type f -name 'koldstore.so' | head -n 1)"
          CONTROL="$(find tarball-extract -type f -name 'koldstore.control' | head -n 1)"
          if [[ -z "${SO}" || -z "${CONTROL}" ]]; then
            echo "::error::koldstore.so / koldstore.control missing from tarball." >&2
            find tarball-extract -type f | sort >&2 || true
            exit 1
          fi

          cp "${SO}" docker-artifacts/koldstore.so
          cp "${CONTROL}" docker-artifacts/koldstore.control
          find "$(dirname "${CONTROL}")" -type f -name 'koldstore--*.sql' -exec cp {} docker-artifacts/ \;

          echo "=== docker-artifacts (${ARCH}) ==="
          ls -lh docker-artifacts/
          file docker-artifacts/koldstore.so || true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push candidate image (${{ matrix.platform }})
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.release
          push: true
          platforms: ${{ matrix.platform }}
          provenance: false
          build-args: |
            PG_MAJOR=${{ env.DOCKER_PG_MAJOR }}
            OCI_IMAGE_DESCRIPTION=${{ steps.vars.outputs.description }}
          labels: |
            org.opencontainers.image.title=pg-koldstore
            org.opencontainers.image.description=${{ steps.vars.outputs.description }}
            org.opencontainers.image.version=${{ needs.read_version.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
          tags: |
            ${{ steps.vars.outputs.docker_repo }}:${{ steps.vars.outputs.candidate_arch_tag }}
            ${{ steps.vars.outputs.ghcr_image }}:${{ steps.vars.outputs.candidate_arch_tag }}

      - name: Smoke-test candidate image
        id: smoke
        shell: bash
        run: |
          set -euo pipefail
          IMAGE="${{ steps.vars.outputs.docker_repo }}:${{ steps.vars.outputs.candidate_arch_tag }}"
          docker pull --platform "${{ matrix.platform }}" "${IMAGE}"
          chmod +x docker/test-release-image.sh
          ./docker/test-release-image.sh "${IMAGE}" 2>&1 | tee "pg-docker-smoke-${{ matrix.arch }}.txt"

      - name: Upload Docker smoke-test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pg-docker-smoke-${{ matrix.arch }}
          path: pg-docker-smoke-${{ matrix.arch }}.txt
          if-no-files-found: ignore

  docker_pg_manifest:
    name: Promote multi-arch PG Docker image
    runs-on: ubuntu-24.04
    needs:
      - read_version
      - docker_pg
    if: >-
      ${{
        inputs.docker_push &&
        always() &&
        !cancelled() &&
        !failure() &&
        needs.docker_pg.result == 'success'
      }}
    env:
      DOCKER_REPO_INPUT: ${{ inputs.docker_repo }}
      GHCR_IMAGE_INPUT: ${{ inputs.ghcr_image }}
    steps:
      - uses: actions/checkout@v4

      - name: Set Docker image variables
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.read_version.outputs.version }}"
          SHORT_SHA="${GITHUB_SHA:0:7}"
          DOCKER_REPO="${DOCKER_REPO_INPUT:-jamals86/pg-koldstore}"
          GHCR_IMAGE="${GHCR_IMAGE_INPUT:-ghcr.io/kalamdb/pg-koldstore}"
          CANDIDATE_TAG="${VERSION}-pg${DOCKER_PG_MAJOR}-ci-${SHORT_SHA}"
          DESCRIPTION="PostgreSQL 16 with koldstore preinstalled for trying KoldStore quickly."
          {
            echo "docker_repo=${DOCKER_REPO}"
            echo "ghcr_image=${GHCR_IMAGE}"
            echo "candidate_tag=${CANDIDATE_TAG}"
            echo "version_tag=${VERSION}-pg${DOCKER_PG_MAJOR}"
            echo "latest_tag=latest"
            echo "description=${DESCRIPTION}"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Promote validated multi-arch tags
        shell: bash
        run: |
          set -euo pipefail
          HUB_REPO="${{ steps.vars.outputs.docker_repo }}"
          GHCR_IMAGE="${{ steps.vars.outputs.ghcr_image }}"
          CANDIDATE="${{ steps.vars.outputs.candidate_tag }}"
          VERSION_TAG="${{ steps.vars.outputs.version_tag }}"
          LATEST_TAG="${{ steps.vars.outputs.latest_tag }}"

          # Single-arch candidates from docker_pg → multi-arch indexes.
          docker buildx imagetools create \
            -t "${HUB_REPO}:${CANDIDATE}" \
            -t "${HUB_REPO}:${VERSION_TAG}" \
            -t "${HUB_REPO}:${LATEST_TAG}" \
            "${HUB_REPO}:${CANDIDATE}-amd64" \
            "${HUB_REPO}:${CANDIDATE}-arm64"

          docker buildx imagetools create \
            -t "${GHCR_IMAGE}:${CANDIDATE}" \
            -t "${GHCR_IMAGE}:${VERSION_TAG}" \
            -t "${GHCR_IMAGE}:${LATEST_TAG}" \
            "${GHCR_IMAGE}:${CANDIDATE}-amd64" \
            "${GHCR_IMAGE}:${CANDIDATE}-arm64"

          echo "::notice::Published multi-arch ${HUB_REPO}:{${CANDIDATE},${VERSION_TAG},${LATEST_TAG}}"
          echo "::notice::Published multi-arch ${GHCR_IMAGE}:{${CANDIDATE},${VERSION_TAG},${LATEST_TAG}}"
          docker buildx imagetools inspect "${HUB_REPO}:${LATEST_TAG}"

      - name: Update Docker Hub repository overview
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ steps.vars.outputs.docker_repo }}
          short-description: ${{ steps.vars.outputs.description }}
          readme-filepath: ./docker/image-description.txt
          enable-url-completion: true

name: pg-koldstore-ci

on:
  push:
    branches: ["main", "001-pg-koldstore-hot-cold-storage"]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  PGRX_VERSION: "0.19.1"

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace

  pgrx:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pg: [15, 16, 17]
    env:
      PG_VER: ${{ matrix.pg }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96.0
      - uses: Swatinem/rust-cache@v2

      - name: Install PostgreSQL ${{ matrix.pg }}
        run: |
          sudo apt-get update -y -qq
          sudo apt-get install -y wget gnupg lsb-release
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo apt-key add -
          sudo apt-get update -y -qq
          sudo apt-get install -y \
            build-essential \
            libssl-dev \
            pkg-config \
            postgresql-${PG_VER} \
            postgresql-server-dev-${PG_VER}

      - name: Install cargo-pgrx
        run: cargo install cargo-pgrx --version ${PGRX_VERSION} --locked

      - name: Initialize pgrx for PostgreSQL ${{ matrix.pg }}
        run: cargo pgrx init --pg${PG_VER} /usr/lib/postgresql/${PG_VER}/bin/pg_config

      - name: Run pgrx tests for PostgreSQL ${{ matrix.pg }}
        run: cargo pgrx test pg${PG_VER} -p pg_koldstore --no-default-features --features pg${PG_VER}

  e2e:
    runs-on: ubuntu-latest
    services:
      minio:
        image: minio/minio:latest
        ports:
          - 9000:9000
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
        options: >-
          --health-cmd "curl -f http://localhost:9000/minio/health/live || exit 1"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96.0
      - uses: Swatinem/rust-cache@v2
      - run: tests/e2e/run_pg_matrix.sh

  memory:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96.0
      - run: tests/memory/run_memory_checks.sh

  benchmarks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96.0
      - run: cargo run -p pg-koldstore-benchmarks -- --suite all

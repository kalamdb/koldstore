[[bench]]
name = "extension_flush"
path = "benches/extension_flush.rs"
harness = false

[[bench]]
name = "extension_cold_pruning"
path = "benches/extension_cold_pruning.rs"
harness = false

[[bench]]
name = "extension_serialization"
path = "benches/extension_serialization.rs"
harness = false

[lints]
workspace = true


services:
  postgres15:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        PG_MAJOR: 15
    image: pg-koldstore:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: koldstore
    ports:
      - "5515:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U postgres -d koldstore && psql -U postgres -d koldstore -tAc \"SELECT 1 FROM pg_extension WHERE extname = 'koldstore'\" | grep -q 1",
        ]
      interval: 5s
      timeout: 5s
      retries: 30

  postgres16:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        PG_MAJOR: 16
    image: pg-koldstore:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: koldstore
    ports:
      - "5516:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U postgres -d koldstore && psql -U postgres -d koldstore -tAc \"SELECT 1 FROM pg_extension WHERE extname = 'koldstore'\" | grep -q 1",
        ]
      interval: 5s
      timeout: 5s
      retries: 30

  postgres17:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        PG_MAJOR: 17
    image: pg-koldstore:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: koldstore
    ports:
      - "5517:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U postgres -d koldstore && psql -U postgres -d koldstore -tAc \"SELECT 1 FROM pg_extension WHERE extname = 'koldstore'\" | grep -q 1",
        ]
      interval: 5s
      timeout: 5s
      retries: 30

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 20


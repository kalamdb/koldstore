[workspace]
members = [
    "crates/koldstore-core",
    "crates/koldstore-manifest",
    "crates/koldstore-storage",
    "crates/koldstore-parquet",
    "crates/koldstore-merge",
    "crates/koldstore-catalog",
    "crates/pg_koldstore",
    "benchmarks",
    "tests/e2e",
    "tests/memory",
]
default-members = [
    "crates/koldstore-core",
    "crates/koldstore-manifest",
    "crates/koldstore-storage",
    "crates/koldstore-parquet",
    "crates/koldstore-merge",
    "crates/koldstore-catalog",
    "crates/pg_koldstore",
    "benchmarks",
    "tests/memory",
]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2021"
license = "Apache-2.0"
repository = "https://github.com/pg-koldstore/pg-kalam"
rust-version = "1.96"

[workspace.dependencies]
koldstore-core = { path = "crates/koldstore-core" }
koldstore-manifest = { path = "crates/koldstore-manifest" }
koldstore-storage = { path = "crates/koldstore-storage" }
koldstore-parquet = { path = "crates/koldstore-parquet" }
koldstore-merge = { path = "crates/koldstore-merge" }
koldstore-catalog = { path = "crates/koldstore-catalog" }

anyhow = "1"
arrow-array = { version = "59.0.0", default-features = false }
arrow-schema = { version = "59.0.0", default-features = false }
base64 = "0.22"
chrono = { version = "0.4.45", default-features = false, features = ["clock", "serde"] }
futures-util = "0.3"
hex = "0.4"
pgrx = { version = "0.19.1", default-features = false }
parquet = { version = "59.0.0", default-features = false, features = ["arrow"] }
postgres-types = "0.2"
rand = "0.10.2"
serde = { version = "1", features = ["derive"] }
serde_json = { version = "1", features = ["preserve_order"] }
sha2 = "0.11.0"
tempfile = "3"
thiserror = "2.0.18"
tokio = { version = "1", features = ["macros", "rt-multi-thread", "process", "time", "fs"] }
tokio-postgres = "0.7"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }
uuid = { version = "1", features = ["v4", "serde"] }

[workspace.lints.rust]
unsafe_op_in_unsafe_fn = "deny"

[workspace.lints.clippy]
correctness = "deny"
suspicious = "warn"
complexity = "warn"
perf = "warn"

[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1

[profile.bench]
inherits = "release"
debug = true
strip = false
